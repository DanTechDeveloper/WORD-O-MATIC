name: Build Verification & Live Production Migration

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

defaults:
  run:
    working-directory: my-app

jobs:
  build-verify-and-migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, iconv, mysql, bcmath, sqlite, pdo_sqlite

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      # STEP 1: I-test muna ang code gamit ang SQLite para ligtas ang live database
      - name: Prepare Test Environment
        run: |
          cp .env.example .env
          php artisan key:generate
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=:memory:" >> .env

      - name: Run Test Migrations
        run: php artisan migrate --force

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build Frontend
        run: |
          npm install
          npm run build

      - name: Run Tests
        run: php artisan test

      # STEP 2: Kapag nakapasa sa test, i-inject ang live Railway credentials at mag-migrate
      - name: Run Live Production Migration on Railway
        env:
          DB_CONNECTION: mysql
          DB_HOST: ${{ secrets.RAILWAY_DB_HOST }}
          DB_PORT: ${{ secrets.RAILWAY_DB_PORT }}
          DB_DATABASE: ${{ secrets.RAILWAY_DB_DATABASE }}
          DB_USERNAME: ${{ secrets.RAILWAY_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.RAILWAY_DB_PASSWORD }}
        run: |
          php artisan migrate --force